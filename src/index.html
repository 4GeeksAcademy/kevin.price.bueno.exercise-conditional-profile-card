<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="container">
      <div class="inputs-section">
        <h2>Edita tu perfil</h2>

        <div class="form-group">
          <label>Nombre</label>
          <input
            type="text"
            class="picker"
            for="name"
            placeholder="Tu nombre"
          />
        </div>

        <div class="form-group">
          <label>Apellido</label>
          <input
            type="text"
            class="picker"
            for="lastName"
            placeholder="Tu apellido"
          />
        </div>

        <div class="form-group">
          <label>Rol</label>
          <input
            type="text"
            class="picker"
            for="role"
            placeholder="Ej: Web Developer"
          />
        </div>

        <div class="form-group">
          <label>Ciudad</label>
          <input
            type="text"
            class="picker"
            for="city"
            placeholder="Tu ciudad"
          />
        </div>

        <div class="form-group">
          <label>País</label>
          <input
            type="text"
            class="picker"
            for="country"
            placeholder="Tu país"
          />
        </div>

        <div class="form-group">
          <label>Twitter (usuario)</label>
          <input type="text" class="picker" for="twitter" placeholder="Sin @" />
        </div>

        <div class="form-group">
          <label>GitHub (usuario)</label>
          <input
            type="text"
            class="picker"
            for="github"
            placeholder="Tu usuario"
          />
        </div>

        <div class="form-group">
          <label>LinkedIn (usuario)</label>
          <input
            type="text"
            class="picker"
            for="linkedin"
            placeholder="Tu usuario"
          />
        </div>

        <div class="form-group">
          <label>Instagram (usuario)</label>
          <input
            type="text"
            class="picker"
            for="instagram"
            placeholder="Sin @"
          />
        </div>

        <div class="form-group">
          <label>URL del Avatar</label>
          <input
            type="text"
            class="picker"
            for="avatarURL"
            placeholder="https://..."
          />
        </div>

        <div class="form-group">
          <label>URL de la Portada</label>
          <input
            type="text"
            class="picker"
            for="background"
            placeholder="https://..."
          />
        </div>

        <div class="form-group">
          <label>¿Mostrar portada?</label>
          <select class="picker" for="includeCover">
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select>
        </div>

        <div class="form-group">
          <label>Posición de redes sociales</label>
          <select class="picker" for="socialMediaPosition">
            <option value="position-right">Derecha</option>
            <option value="position-left">Izquierda</option>
          </select>
        </div>
      </div>

      <div class="card-section">
        <div id="widget_content"></div>
      </div>
    </div>

    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
